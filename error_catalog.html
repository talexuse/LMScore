<!DOCTYPE html><html><head><meta charset="utf-8"><title>Error & Measurement Catalog</title>
<style>
body{background:#0f172a;color:#e2e8f0;font-family:system-ui;margin:20px;max-width:1200px}
h1{font-size:24px;margin-bottom:4px}.sub{color:#64748b;font-size:12px;margin-bottom:24px}
.section{font-size:16px;font-weight:700;border-bottom:2px solid #1e293b;padding:28px 0 8px;margin-bottom:16px}
.section span{font-size:11px;color:#64748b;font-weight:400;margin-left:8px}
.ec{background:#1e293b;border-radius:12px;margin-bottom:16px;border:1px solid #334155;overflow:hidden}
.eh{padding:14px 20px;border-bottom:1px solid #334155}
.en{font-size:18px;font-weight:800;color:#f1f5f9;margin-bottom:4px}
.ei{font-size:10px;color:#475569;font-family:monospace;margin-bottom:8px}
.es,.ev{display:inline-block;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:600;margin-right:6px}
.ed{font-size:13px;color:#94a3b8;line-height:1.6;padding:12px 20px}
.samples{display:flex;gap:8px;padding:0 20px 16px;overflow-x:auto}
.sample img{height:280px;border-radius:8px;border:1px solid #334155}
@media(max-width:800px){.samples{flex-wrap:wrap}.sample img{height:auto;width:100%}}
</style></head><body>
<h1>Error & Measurement Catalog</h1>
<p class="sub">Real swing frames with skeleton overlay. Faces blurred for privacy.</p>
<div class="section" style="color:#f87171">CRITICAL <span>Fundamental faults — -20 pts each</span></div><div class="section" style="color:#fb923c">MAJOR <span>Significant faults — -10 pts each</span></div><div class="section" style="color:#facc15">MINOR <span>Moderate faults — -5 pts each</span></div><div class="section" style="color:#94a3b8">INFO <span>Displayed but no deduction ($ or silenced)</span></div>
</body></html>
