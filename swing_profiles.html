<!DOCTYPE html><html><head><meta charset="utf-8"><title>Swing Profiles & Measurements</title>
<style>
body{background:#0f172a;color:#e2e8f0;font-family:system-ui;margin:20px;max-width:1300px}
h1{font-size:24px;margin-bottom:4px}.sub{color:#64748b;font-size:12px;margin-bottom:24px}
.section-title{font-size:16px;font-weight:700;color:#38bdf8;border-bottom:2px solid #1e293b;padding:24px 0 8px;margin-bottom:16px}
.pc{background:#1e293b;border-radius:12px;margin-bottom:16px;border:2px solid #334155;overflow:hidden}
.ph{padding:16px 20px;border-bottom:1px solid #334155}
.pn{font-size:18px;font-weight:800;margin-bottom:2px}
.ps{font-size:11px;color:#94a3b8;margin-bottom:8px}
.pt,.pg{display:inline-block;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:600;margin-right:6px}
.pg{background:#1e293b;color:#facc15;border:1px solid #facc1530}
.pb{padding:16px 20px}
.pf{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto}
.frame-img{flex-shrink:0;position:relative}
.frame-img img{height:300px;border-radius:8px;border:1px solid #334155}
.frame-label{position:absolute;top:6px;left:6px;background:#0f172aCC;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;color:#38bdf8}
.pd{font-size:12px;color:#94a3b8;line-height:1.6}
.pm{font-size:10px;color:#64748b;margin-top:8px;padding:6px 10px;background:#0f172a;border-radius:4px;font-family:monospace}
.mc{background:#1e293b;border-radius:12px;margin-bottom:16px;border:1px solid #334155;overflow:hidden}
.mh{padding:14px 20px;border-bottom:1px solid #334155}
.mn{font-size:16px;font-weight:700;color:#4ade80}
.mg{font-size:10px;color:#facc15;margin-top:2px}
.mb{display:flex;gap:20px;padding:16px 20px}
.mi img{height:320px;border-radius:8px;border:2px solid #334155}
.md{font-size:13px;color:#94a3b8;line-height:1.7;padding-top:8px}
@media(max-width:900px){.pf{flex-wrap:wrap}.pb,.mb{flex-direction:column}.mi img,.frame-img img{height:auto;width:100%}}
</style></head><body>
<h1>Swing Profiles & Measurements</h1>
<p class="sub">Real swing frames from the dataset. Faces blurred. Each swing type shown with its top scorer.</p>
<div class="section-title">Swing Profiles — Best Scorer Per Type</div><div class="section-title">Key Measurements — Pro Reference (Tiger & Rory)</div>
